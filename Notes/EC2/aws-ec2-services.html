<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS EC2 — Complete Services Guide</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #888;
    --compute: #7ee8a2;
    --storage: #7ecbe8;
    --networking: #b07ee8;
    --security: #e8a87e;
    --scaling: #e8e87e;
    --pricing: #e87e9f;
    --mgmt: #7ec4e8;
    --specialty: #e8c47e;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    padding: 40px 32px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo span { color: #ff9900; font-weight: 500; }

  header h1 {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 2px;
    color: var(--muted);
    margin-left: auto;
  }

  /* SEARCH */
  .search-bar {
    width: 100%;
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: #555; }
  .search-bar input::placeholder { color: var(--muted); }

  /* FILTERS */
  .filters {
    padding: 14px 32px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--surface);
    color: var(--text);
    border-color: #444;
  }

  .filter-btn[data-cat="compute"].active { border-color: var(--compute); color: var(--compute); }
  .filter-btn[data-cat="storage"].active { border-color: var(--storage); color: var(--storage); }
  .filter-btn[data-cat="networking"].active { border-color: var(--networking); color: var(--networking); }
  .filter-btn[data-cat="security"].active { border-color: var(--security); color: var(--security); }
  .filter-btn[data-cat="scaling"].active { border-color: var(--scaling); color: var(--scaling); }
  .filter-btn[data-cat="pricing"].active { border-color: var(--pricing); color: var(--pricing); }
  .filter-btn[data-cat="management"].active { border-color: var(--mgmt); color: var(--mgmt); }
  .filter-btn[data-cat="specialty"].active { border-color: var(--specialty); color: var(--specialty); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--border);
    padding: 0;
  }

  /* CARD */
  .card {
    background: var(--surface);
    padding: 20px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card:hover { background: #1e1e1e; }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 1px;
  }

  .tag-compute  { background: rgba(126,232,162,0.12); color: var(--compute); }
  .tag-storage  { background: rgba(126,203,232,0.12); color: var(--storage); }
  .tag-networking { background: rgba(176,126,232,0.12); color: var(--networking); }
  .tag-security { background: rgba(232,168,126,0.12); color: var(--security); }
  .tag-scaling  { background: rgba(232,232,126,0.12); color: var(--scaling); }
  .tag-pricing  { background: rgba(232,126,159,0.12); color: var(--pricing); }
  .tag-management { background: rgba(126,196,232,0.12); color: var(--mgmt); }
  .tag-specialty { background: rgba(232,196,126,0.12); color: var(--specialty); }

  .chevron {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.2s;
    user-select: none;
  }

  .card.open .chevron { transform: rotate(180deg); }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .card-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* DETAIL PANEL */
  .detail {
    display: none;
    border-top: 1px solid var(--border);
    margin-top: 12px;
    padding-top: 14px;
    flex-direction: column;
    gap: 14px;
  }

  .card.open .detail { display: flex; }

  .detail-section h4 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .detail-section p {
    font-size: 12px;
    line-height: 1.65;
    color: #ccc;
  }

  .use-cases {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .uc {
    font-size: 11px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 2px 9px;
    border-radius: 2px;
    color: #bbb;
  }

  .pricing-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    border-left: 2px solid var(--border);
    padding-left: 10px;
  }

  /* FOOTER */
  footer {
    padding: 24px 32px;
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo"><span>AWS</span> / EC2</div>
  <h1>Complete Services Reference</h1>
  <div class="count" id="countDisplay">47 services</div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search services, e.g. Spot, EBS, Security Groups…">
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="compute">Compute</button>
  <button class="filter-btn" data-cat="storage">Storage</button>
  <button class="filter-btn" data-cat="networking">Networking</button>
  <button class="filter-btn" data-cat="security">Security</button>
  <button class="filter-btn" data-cat="scaling">Scaling & LB</button>
  <button class="filter-btn" data-cat="pricing">Pricing Models</button>
  <button class="filter-btn" data-cat="management">Management</button>
  <button class="filter-btn" data-cat="specialty">Specialty</button>
</div>

<div class="grid" id="grid"></div>

<footer>
  <span>AWS EC2 Services Reference · March 2026</span>
  <span>Click any card to expand</span>
</footer>

<script>
const services = [
  // ── COMPUTE ──────────────────────────────────────────────────────────────
  {
    cat: "compute", name: "General Purpose Instances",
    summary: "Balanced CPU, memory & networking",
    detail: {
      desc: "General Purpose instances (T, M, Mac families) provide a balance of compute, memory, and networking resources. T-series instances feature burstable CPU performance — they accumulate CPU credits during low-usage periods and spend them when demand spikes. M-series offer fixed, sustained performance and are the workhorses of most web applications.",
      families: "T4g, T3, T3a, T2 (burstable) · M7g, M7i, M7a, M6g, M6i, M6a, M5, M5a, M5n (fixed performance)",
      usecases: ["Web servers","Microservices","Dev/test environments","Small databases","Code repos","Enterprise apps"],
      pricing: "On-Demand, Reserved, Savings Plans, Spot available. T-series cheapest entry point."
    }
  },
  {
    cat: "compute", name: "Compute Optimized Instances",
    summary: "High-performance processors for compute-heavy work",
    detail: {
      desc: "C-family instances deliver the highest compute performance per dollar in EC2. They use the latest Intel Xeon, AMD EPYC, or AWS Graviton processors optimized for raw CPU throughput. Ideal when workloads are CPU-bound rather than memory or I/O bound.",
      families: "C7g, C7i, C7a, C6g, C6i, C6a, C5, C5a, C5n",
      usecases: ["Batch processing","Media transcoding","High-traffic web servers","Scientific modeling","Dedicated game servers","Ad serving"],
      pricing: "Typically 5–15% cheaper than equivalent M-series per vCPU. Great Spot candidates."
    }
  },
  {
    cat: "compute", name: "Memory Optimized Instances",
    summary: "Large RAM for in-memory databases & analytics",
    detail: {
      desc: "R, X, z, and High Memory instances provide massive RAM-to-vCPU ratios for workloads that need to hold large datasets in memory. X instances can reach up to 24 TB of RAM. z1d pairs high-frequency cores (up to 4.0 GHz) with large memory for per-core licensed software.",
      families: "R8g, R7g, R7i, R7a, R6g, R6i · X2gd, X2idn, X2iedn, X2iezn · z1d · High Memory (u-* series)",
      usecases: ["SAP HANA","Redis/Memcached","In-memory analytics","Apache Spark","Real-time big data","HPC simulations"],
      pricing: "Premium pricing due to high RAM. Reserved instances critical for cost control. X-series by quotas."
    }
  },
  {
    cat: "compute", name: "Storage Optimized Instances",
    summary: "High I/O, local NVMe for data-intensive work",
    detail: {
      desc: "I, D, Im, Is, and H instances prioritize local NVMe SSD storage and extremely high sequential disk I/O. These are not about network-attached EBS — they come with physically attached NVMe drives offering millions of IOPS and very low latency. D-series trades IOPS for high disk throughput with dense HDD storage.",
      families: "I4i, I4g, I3, I3en · Im4gn, Is4gen · D3, D3en, D2 · H1",
      usecases: ["NoSQL databases (Cassandra, MongoDB)","OLTP databases","Elasticsearch","Data warehousing","Hadoop/HDFS","Log indexing"],
      pricing: "Local storage included in instance price — no EBS cost for primary storage. Watch out: data is ephemeral."
    }
  },
  {
    cat: "compute", name: "Accelerated Computing Instances",
    summary: "GPUs, Trainium, Inferentia chips",
    detail: {
      desc: "This family includes GPU instances (P, G, Gr, F series) and AWS custom silicon (Trn, Inf series). P-series for training ML models, G-series for graphics rendering and inference, F-series for FPGAs (custom logic), and the purpose-built Trainium/Inferentia chips for training and inference at dramatically lower cost-per-computation.",
      families: "P5, P4, P3 · G6, G6e, G5, G5g, G4dn, G4ad · Gr6 · F1 · Trn2, Trn1 · Inf2, Inf1",
      usecases: ["Deep learning training","ML inference","Video rendering","3D graphics","FPGA workloads","Genomics","Fluid dynamics"],
      pricing: "Most expensive instance family. Spot can save 70–90% for interruptible training jobs."
    }
  },
  {
    cat: "compute", name: "HPC Optimized Instances",
    summary: "Hpc6a/Hpc7g for tightly-coupled HPC",
    detail: {
      desc: "HPC instances are specifically built for high-performance computing workloads that require ultra-low latency node-to-node communication via Elastic Fabric Adapter (EFA). They feature high-core-count processors and 400 Gbps EFA networking — essential for MPI-based scientific computing where latency between nodes matters enormously.",
      families: "Hpc7g (Graviton3E), Hpc6a (AMD EPYC), Hpc6id",
      usecases: ["Computational fluid dynamics","Weather modeling","Seismic analysis","Financial risk modeling","Molecular dynamics","Quantum chemistry"],
      pricing: "Available as On-Demand or Reserved. Must enable EFA; placement groups required for full performance."
    }
  },
  {
    cat: "compute", name: "Mac Instances",
    summary: "Bare metal macOS for app development",
    detail: {
      desc: "Mac instances run macOS on actual Apple Mac mini (Intel) or Mac Studio (Apple Silicon M1/M2) hardware via bare-metal access. They are the only legal way to run macOS in a cloud environment as mandated by Apple's licensing. Used primarily for iOS/macOS CI/CD pipelines. Minimum 24-hour allocation due to Apple licensing requirements.",
      families: "mac1 (Intel Core i7) · mac2 (Apple M1) · mac2-m2 (M2) · mac2-m2pro (M2 Pro)",
      usecases: ["iOS app builds","Xcode CI/CD pipelines","macOS app testing","App Store submission","Swift compilation"],
      pricing: "Dedicated host model — billed per host per hour, 24-hour minimum. Most expensive per-unit EC2 option."
    }
  },

  // ── STORAGE ───────────────────────────────────────────────────────────────
  {
    cat: "storage", name: "Amazon EBS (Elastic Block Store)",
    summary: "Persistent block storage volumes for EC2",
    detail: {
      desc: "EBS provides network-attached block storage that persists independently of an EC2 instance's lifecycle. Volumes are replicated within an Availability Zone for durability. EBS supports multiple volume types tuned for IOPS vs. throughput vs. cost, and can be snapshotted to S3 for backup. Multi-Attach is supported on io1/io2 for shared access.",
      families: "gp3, gp2 (General Purpose SSD) · io2 Block Express, io1 (Provisioned IOPS SSD) · st1 (Throughput HDD) · sc1 (Cold HDD)",
      usecases: ["OS root volumes","SQL databases","Enterprise apps","Boot volumes","Data warehouses","Log storage"],
      pricing: "Billed per GB-month + IOPS + throughput for provisioned types. Snapshots billed per GB stored in S3."
    }
  },
  {
    cat: "storage", name: "Instance Store",
    summary: "Ephemeral local NVMe attached to host",
    detail: {
      desc: "Instance Store provides temporary block-level storage physically hosted on the same server as the instance. Extremely low latency (sub-millisecond) since there's no network hop. Data is permanently lost on instance stop, hibernate, or termination. Ideal as a scratch disk or cache — never rely on it for persistent data unless mirrored.",
      families: "Available on I, D, H, M5d, C5d, R5d, z1d and other 'd' variants",
      usecases: ["Temp scratch space","Caches & buffers","Log aggregation staging","Shuffle space for MapReduce","Swap space"],
      pricing: "Included in instance price — no additional charge. Cost is accepting the ephemeral trade-off."
    }
  },
  {
    cat: "storage", name: "Amazon EFS (Elastic File System)",
    summary: "Managed NFS file system, multi-instance",
    detail: {
      desc: "EFS is a fully managed, elastic NFS file system that can be mounted by thousands of EC2 instances simultaneously across multiple Availability Zones. It scales storage automatically to petabytes and back without provisioning. Two performance modes (General Purpose, Max I/O) and two throughput modes (Bursting, Provisioned).",
      families: "Standard · Infrequent Access (IA) · One Zone · One Zone-IA",
      usecases: ["Shared web content","CMS file storage","Big data analytics","Container storage","Lift-and-shift NFS apps","DevOps shared builds"],
      pricing: "Pay per GB stored per month. IA tier is ~92% cheaper. Data access charges apply for IA retrieval."
    }
  },
  {
    cat: "storage", name: "Amazon FSx",
    summary: "Fully managed 3rd-party file systems",
    detail: {
      desc: "FSx offers fully managed versions of popular third-party file systems, eliminating the operational burden of running them yourself. Each variant is tuned for specific workloads and protocols. Includes FSx for Windows File Server (SMB/NTFS), Lustre (HPC), NetApp ONTAP (enterprise NAS), and OpenZFS (ZFS semantics with snapshots).",
      families: "FSx for Windows File Server · FSx for Lustre · FSx for NetApp ONTAP · FSx for OpenZFS",
      usecases: ["Windows file shares","HPC parallel file systems","Enterprise NAS migration","ERP file access","ML training data","Analytics scratch"],
      pricing: "Varies by type. Provisioned SSD or HDD storage + throughput capacity billed per month."
    }
  },

  // ── NETWORKING ────────────────────────────────────────────────────────────
  {
    cat: "networking", name: "Amazon VPC (Virtual Private Cloud)",
    summary: "Isolated private network for EC2 resources",
    detail: {
      desc: "VPC lets you provision a logically isolated section of AWS where you launch resources in a virtual network you define. You control IP address ranges, subnets (public/private), route tables, NAT gateways, and internet gateways. VPC is the fundamental networking layer for all EC2 resources.",
      families: "Subnets · Route Tables · Internet Gateway · NAT Gateway · VPC Endpoints · VPC Peering · Transit Gateway",
      usecases: ["Multi-tier architectures","Private database subnets","Hub-and-spoke networking","On-prem connectivity","Compliance isolation","Multi-VPC federation"],
      pricing: "VPC itself is free. NAT Gateway billed per hour + per GB processed. VPC Endpoints charged per hour."
    }
  },
  {
    cat: "networking", name: "Elastic Load Balancing (ELB)",
    summary: "Distribute traffic across instances",
    detail: {
      desc: "ELB automatically distributes incoming application traffic across multiple targets — EC2 instances, containers, IPs, Lambda functions. Three types: ALB (Application, L7, HTTP/HTTPS with path/host routing), NLB (Network, L4, ultra-low latency TCP/UDP), and GWLB (Gateway, for inline virtual appliances like firewalls).",
      families: "ALB (Application) · NLB (Network) · GWLB (Gateway) · CLB (Classic — legacy)",
      usecases: ["Web app routing","SSL termination","Blue/green deployments","A/B testing","Firewall traffic inspection","Static IP front-ends"],
      pricing: "Per LCU (Load Balancer Capacity Unit) per hour + per hour active. NLB also charges per new flow."
    }
  },
  {
    cat: "networking", name: "Security Groups",
    summary: "Stateful instance-level firewall",
    detail: {
      desc: "Security Groups act as a virtual firewall at the instance's network interface level. They are stateful — if you allow inbound traffic, the return traffic is automatically allowed. Rules specify protocol, port range, and source/destination (IP ranges or other Security Groups). Up to 5 SGs per ENI, up to 60 rules per SG.",
      families: "Inbound rules · Outbound rules · Security Group references",
      usecases: ["Restrict SSH/RDP access","Allow web traffic","Database access control","Internal service communication","Defense-in-depth layers"],
      pricing: "Free — no charge for Security Groups."
    }
  },
  {
    cat: "networking", name: "Network ACLs (NACLs)",
    summary: "Stateless subnet-level firewall",
    detail: {
      desc: "NACLs are an optional security layer at the subnet level. Unlike Security Groups, they are stateless — you must explicitly allow both inbound and outbound traffic. Rules are evaluated in numerical order and the first matching rule applies. Useful as a broad perimeter defense alongside Security Groups.",
      families: "Inbound rules · Outbound rules (numbered, evaluated in order)",
      usecases: ["Block IPs at subnet boundary","Compliance perimeter controls","Defense-in-depth with SGs","Explicit DENY rules (SGs can't deny)"],
      pricing: "Free."
    }
  },
  {
    cat: "networking", name: "Elastic IP Addresses",
    summary: "Static public IPv4 addresses for your account",
    detail: {
      desc: "Elastic IPs (EIPs) are static public IPv4 addresses that you can allocate to your account and associate with any EC2 instance or ENI. Unlike the dynamic public IPs assigned at launch, EIPs persist. Useful for hosting services that external clients hard-code by IP or for quick failover between instances.",
      families: "Standard EIP · BYOIP (Bring Your Own IP)",
      usecases: ["DNS A-record stability","NAT gateway front-end","Failover IP remapping","Whitelisting scenarios"],
      pricing: "Free when associated with a running instance. Charged per hour when allocated but unassociated."
    }
  },
  {
    cat: "networking", name: "Elastic Network Interfaces (ENI)",
    summary: "Virtual network cards for instances",
    detail: {
      desc: "An ENI is a logical network component that represents a virtual NIC. Each instance gets a primary ENI (eth0) but you can attach secondary ENIs for multi-homed configurations, separate security policies per interface, or to move an interface (with its private IP and MAC) between instances in the same AZ.",
      families: "Primary ENI · Secondary ENI · Trunk ENI (EKS)",
      usecases: ["Dual-homed appliances","License servers (MAC-tied)","Separate management interfaces","Container networking"],
      pricing: "ENIs themselves are free. IP address charges apply for extra private IPs."
    }
  },
  {
    cat: "networking", name: "Elastic Fabric Adapter (EFA)",
    summary: "Low-latency RDMA networking for HPC/ML",
    detail: {
      desc: "EFA is a network device you can attach to EC2 instances to accelerate HPC applications and ML training that require high throughput and low latency node-to-node communication. It bypasses the OS kernel with OS-bypass technology (similar to RDMA), enabling latency as low as single-digit microseconds.",
      families: "EFA for HPC instances · SRD (Scalable Reliable Datagram) for ML",
      usecases: ["MPI tightly-coupled HPC","NCCL-based ML training","Large model distributed training","Molecular dynamics"],
      pricing: "EFA is free — it's a capability of supported instances, not a separate product."
    }
  },
  {
    cat: "networking", name: "AWS Direct Connect",
    summary: "Dedicated private link from on-prem to AWS",
    detail: {
      desc: "Direct Connect establishes a dedicated network connection from your on-premises data center to AWS, bypassing the public internet. Provides consistent bandwidth, lower latency, and reduced data transfer costs vs. internet-based VPN. Speeds from 50 Mbps to 100 Gbps. Often used with a hosted/dedicated connection from a Direct Connect partner.",
      families: "Dedicated Connection (1G, 10G, 100G) · Hosted Connection (50Mbps–10Gbps via partner)",
      usecases: ["Large data migrations","Hybrid cloud","Consistent latency apps","Regulatory compliance","High-volume data transfer"],
      pricing: "Port-hour charge + data transfer out charge (lower than standard internet egress rates)."
    }
  },
  {
    cat: "networking", name: "VPN Connections",
    summary: "Encrypted tunnel from on-prem to VPC",
    detail: {
      desc: "AWS Site-to-Site VPN creates an IPsec-encrypted tunnel between your on-premises network and your VPC over the public internet. Each VPN connection includes two tunnels for redundancy. Client VPN provides OpenVPN-based remote access for individual users. Easier to set up than Direct Connect but limited to ~1.25 Gbps per tunnel.",
      families: "Site-to-Site VPN · AWS Client VPN · Accelerated VPN (Global Accelerator backed)",
      usecases: ["Remote office connectivity","Disaster recovery","Development hybrid access","Remote employee VPN"],
      pricing: "Per VPN connection-hour + data transfer out charges."
    }
  },
  {
    cat: "networking", name: "AWS Transit Gateway",
    summary: "Hub-and-spoke VPC and VPN routing",
    detail: {
      desc: "Transit Gateway is a regional network transit hub that interconnects thousands of VPCs and on-premises networks through a single gateway, replacing the complexity of full-mesh VPC peering. Supports multicast, inter-region peering, and centralized routing policies via route tables.",
      families: "TGW attachments (VPC, VPN, Direct Connect, peering)",
      usecases: ["Multi-VPC architecture","Cross-account networking","Centralized firewall","Shared services VPC","Multi-region transit"],
      pricing: "Per attachment-hour + per GB data processed."
    }
  },
  {
    cat: "networking", name: "Amazon Route 53",
    summary: "DNS service and health checking",
    detail: {
      desc: "Route 53 is AWS's highly available DNS service. In EC2 context it provides DNS-based load balancing, health checks, failover routing, latency routing, and geolocation routing. Private hosted zones allow internal DNS resolution within VPCs without exposing names publicly.",
      families: "Public Hosted Zones · Private Hosted Zones · Health Checks · Traffic Policies",
      usecases: ["Domain registration","EC2 DNS failover","Latency-based routing","Blue/green switching","Internal service discovery"],
      pricing: "Per hosted zone/month + per DNS query + per health check/month."
    }
  },

  // ── SECURITY ──────────────────────────────────────────────────────────────
  {
    cat: "security", name: "IAM Roles for EC2",
    summary: "Grant AWS permissions to instances",
    detail: {
      desc: "IAM Roles attached to EC2 instances via Instance Profiles provide temporary credentials automatically rotated by the AWS metadata service (IMDS). Instances get permissions without any long-lived access keys embedded in code or config. Best practice: always use roles instead of access keys on EC2.",
      families: "Instance Profiles · IAM Policies (managed/inline) · IMDS v1/v2",

// ── RENDER ────────────────────────────────────────────────────────────────

function catColor(cat) {
  const map = { compute:'compute', storage:'storage', networking:'networking', security:'security', scaling:'scaling', pricing:'pricing', management:'management', specialty:'specialty' };
  return map[cat] || 'compute';
}

function render(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  list.forEach((s, idx) => {
    const uc = (s.detail.usecases || []).map(u => `<span class="uc">${u}</span>`).join('');
    const families = s.detail.families ? `<div class="detail-section"><h4>Instance Families / Variants</h4><p>${s.detail.families}</p></div>` : '';
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cat = s.cat;
    card.dataset.idx = idx;
    card.innerHTML = `
      <div class="card-top">
        <span class="tag tag-${catColor(s.cat)}">${s.cat}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="card-title">${s.name}</div>
      <div class="card-summary">${s.summary}</div>
      <div class="detail">
        <div class="detail-section"><h4>Overview</h4><p>${s.detail.desc}</p></div>
        ${families}
        ${uc ? `<div class="detail-section"><h4>Use Cases</h4><div class="use-cases">${uc}</div></div>` : ''}
        ${s.detail.pricing ? `<div class="detail-section"><h4>Pricing Notes</h4><p class="pricing-note">${s.detail.pricing}</p></div>` : ''}
      </div>`;
    card.addEventListener('click', () => card.classList.toggle('open'));
    grid.appendChild(card);
  });
  document.getElementById('countDisplay').textContent = `${list.length} services`;
}

// Filter + Search
let activeCat = 'all';
let searchVal = '';

function applyFilters() {
  let list = services;
  if (activeCat !== 'all') list = list.filter(s => s.cat === activeCat);
  if (searchVal) {
    const q = searchVal.toLowerCase();
    list = list.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.summary.toLowerCase().includes(q) ||
      s.detail.desc.toLowerCase().includes(q) ||
      (s.detail.usecases || []).some(u => u.toLowerCase().includes(q))
    );
  }
  render(list);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchVal = e.target.value;
  applyFilters();
});

render(services);
</script>
