AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFront Stack — CDN in front of ALB, enforces HTTPS

Parameters:

  ALBDNS:
    Type: String
    Description: DNS name of the ALB (origin)

Resources:

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:

        Enabled: true
        Comment: CloudFront in front of ALB — HTTP to HTTPS redirect

        # ── ORIGIN ──────────────────────────────────────
        # CloudFront talks to the ALB over plain HTTP on port 80.
        # SSL is terminated at CloudFront, not the ALB.
        Origins:
          - Id: ALBOrigin
            DomainName: !Ref ALBDNS
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              # Use HTTP to talk to ALB — no cert needed on ALB side
              OriginProtocolPolicy: http-only
              OriginSSLProtocols:
                - TLSv1.2

        # ── DEFAULT CACHE BEHAVIOUR ──────────────────────
        DefaultCacheBehavior:
          TargetOriginId: ALBOrigin

          # Redirect HTTP → HTTPS at the CloudFront edge
          ViewerProtocolPolicy: redirect-to-https

          # Use the AWS managed caching-disabled policy
          # so all requests pass through to the ALB (no caching)
          # Good for dynamic apps — change to CachingOptimized for static
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad

          # Forward all headers, cookies, query strings to ALB
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3

          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD

        # ── PRICE CLASS ──────────────────────────────────
        # PriceClass_100 = US, Canada, Europe only (cheapest)
        # PriceClass_All = all edge locations globally
        PriceClass: PriceClass_100

        # ── TLS ──────────────────────────────────────────
        # AWS provides a free managed certificate for the
        # cloudfront.net domain automatically — no ACM setup needed
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2021

        # ── HTTP VERSIONS ────────────────────────────────
        HttpVersion: http2and3

Outputs:

  CloudFrontDomain:
    Description: Access your app at this URL (HTTPS enforced)
    Value: !Sub "https://${Distribution.DomainName}"

  CloudFrontDistributionId:
    Value: !Ref Distribution