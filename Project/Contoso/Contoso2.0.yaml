AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Contoso Startup Labs - AWS IAM Basics Lab | Windows Jump VM with pre-installed tools

Parameters:

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
    Description: EC2 instance type for the Windows Jump VM. Only free-tier eligible types are allowed.

  WindowsAMIId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: /aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base
    Description: Windows Server 2022 AMI ID resolved from SSM Parameter Store for the deployment region.

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the Lab VPC.

  PublicSubnetCIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the public subnet.

  RDPAllowedCIDR:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR range allowed to reach the VM over RDP/HTTPS. Restrict to CloudLabs IP range in production.

  VMAdminUsername:
    Type: String
    Default: LabAdmin
    Description: Local administrator username for the Windows VM.

  VMAdminPassword:
    Type: String
    NoEcho: true
    MinLength: 12
    MaxLength: 64
    Description: Local administrator password for the Windows VM. Must be at least 12 characters.
    ConstraintDescription: Must be at least 12 characters long.

  LabUserTag:
    Type: String
    Default: lab-user
    Description: Tag value used to identify all resources belonging to this lab deployment.

  # ── IAM Console User ──────────────────────────────────────────────────────
  LabIAMConsoleUsername:
    Type: String
    Default: lab-student
    Description: IAM username that developers use to log into the AWS Console.

  LabIAMConsolePassword:
    Type: String
    NoEcho: true
    MinLength: 12
    MaxLength: 64
    Default: LabStudent@2025!
    Description: >-
      Console login password for the lab IAM user. Must be at least 12 characters,
      include uppercase, lowercase, a number, and a special character.
    ConstraintDescription: Must be at least 12 characters and meet AWS password complexity requirements.

Resources:

  # ── Permission Boundary ───────────────────────────────────────────────────
  LabPermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: LabPermissionBoundary
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: BoundaryAllowEC2FreeTierOnly
            Effect: Allow
            Action:
              - ec2:RunInstances
              - ec2:StopInstances
              - ec2:StartInstances
              - ec2:TerminateInstances
              - ec2:RebootInstances
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
              - ec2:DescribeInstanceTypes
              - ec2:DescribeImages
              - ec2:DescribeKeyPairs
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSecurityGroupRules
              - ec2:DescribeVpcs
              - ec2:DescribeSubnets
              - ec2:DescribeRouteTables
              - ec2:DescribeInternetGateways
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeRegions
              - ec2:DescribeTags
              - ec2:DescribeVolumes
              - ec2:DescribeNetworkInterfaces
              - ec2:CreateKeyPair
              - ec2:DeleteKeyPair
              - ec2:ImportKeyPair
              - ec2:CreateSecurityGroup
              - ec2:DeleteSecurityGroup
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:AuthorizeSecurityGroupEgress
              - ec2:RevokeSecurityGroupIngress
              - ec2:RevokeSecurityGroupEgress
              - ec2:CreateTags
              - ec2:DeleteTags
            Resource: '*'
            Condition:
              StringEquals:
                ec2:InstanceType:
                  - t2.micro
                  - t3.micro
          - Sid: BoundaryAllowEC2DescribeUnconditional
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
              - ec2:DescribeInstanceTypes
              - ec2:DescribeImages
              - ec2:DescribeKeyPairs
              - ec2:DescribeSecurityGroups
              - ec2:DescribeVpcs
              - ec2:DescribeSubnets
              - ec2:DescribeRegions
              - ec2:DescribeTags
              - ec2:DescribeVolumes
              - ec2:DescribeAvailabilityZones
            Resource: '*'
          - Sid: BoundaryAllowIAMScopedToLabOnly
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:GetRole
              - iam:ListRoles
              - iam:PassRole
              - iam:TagRole
              - iam:UntagRole
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:SetDefaultPolicyVersion
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicies
              - iam:ListPolicyVersions
              - iam:ListEntitiesForPolicy
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:CreateInstanceProfile
              - iam:DeleteInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:RemoveRoleFromInstanceProfile
              - iam:GetInstanceProfile
              - iam:ListInstanceProfiles
              - iam:ListInstanceProfilesForRole
              - iam:GetUser
              - iam:ListUsers
              - iam:GetGroup
              - iam:ListGroups
              - iam:GetUserPolicy
              - iam:ListUserPolicies
              - iam:ListAttachedUserPolicies
              - iam:ListGroupsForUser
              - iam:GetAccountSummary
              - iam:GetAccountPasswordPolicy
              - iam:GetCredentialReport
              - iam:GenerateCredentialReport
              - iam:SimulatePrincipalPolicy
              - iam:SimulateCustomPolicy
              - iam:ChangePassword
              - iam:GetLoginProfile
              - iam:CreateAccessKey
              - iam:DeleteAccessKey
              - iam:ListAccessKeys
              - iam:UpdateAccessKey
              - iam:GetAccessKeyLastUsed
            Resource: '*'
            Condition:
              StringEquals:
                iam:PermissionsBoundary: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/LabPermissionBoundary'
          - Sid: BoundaryAllowIAMReadWithoutBoundaryCondition
            Effect: Allow
            Action:
              - iam:GetRole
              - iam:ListRoles
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicies
              - iam:ListPolicyVersions
              - iam:ListEntitiesForPolicy
              - iam:GetUser
              - iam:ListUsers
              - iam:GetGroup
              - iam:ListGroups
              - iam:GetAccountSummary
              - iam:GetCredentialReport
              - iam:GenerateCredentialReport
              - iam:SimulatePrincipalPolicy
              - iam:SimulateCustomPolicy
            Resource: '*'
          - Sid: BoundaryAllowS3Basic
            Effect: Allow
            Action:
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation
              - s3:ListBucket
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:CreateBucket
              - s3:DeleteBucket
              - s3:GetBucketPolicy
              - s3:PutBucketPolicy
              - s3:GetBucketAcl
              - s3:PutBucketAcl
            Resource: '*'
          - Sid: BoundaryAllowSupportingServices
            Effect: Allow
            Action:
              - cloudwatch:GetMetricData
              - cloudwatch:GetMetricStatistics
              - cloudwatch:ListMetrics
              - cloudwatch:DescribeAlarms
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:GetLogEvents
              - logs:FilterLogEvents
              - sts:GetCallerIdentity
              - sts:AssumeRole
            Resource: '*'
          - Sid: BoundaryDenyEscalationVectors
            Effect: Deny
            Action:
              - iam:CreateUser
              - iam:DeleteUser
              - iam:UpdateUser
              - iam:CreateLoginProfile
              - iam:DeleteLoginProfile
              - iam:AddUserToGroup
              - iam:RemoveUserFromGroup
              - iam:CreateGroup
              - iam:DeleteGroup
              - iam:UpdateGroup
              - iam:AttachUserPolicy
              - iam:DetachUserPolicy
              - iam:PutUserPolicy
              - iam:DeleteUserPolicy
              - iam:AttachGroupPolicy
              - iam:DetachGroupPolicy
              - iam:PutGroupPolicy
              - iam:DeleteGroupPolicy
              - iam:UpdateAssumeRolePolicy
            Resource: '*'
          - Sid: BoundaryDenyBoundaryRemovalOrModification
            Effect: Deny
            Action:
              - iam:DeleteRolePermissionsBoundary
              - iam:DeleteUserPermissionsBoundary
              - iam:PutRolePermissionsBoundary
              - iam:PutUserPermissionsBoundary
            Resource: '*'
          - Sid: BoundaryDenyBillingAndOrgActions
            Effect: Deny
            Action:
              - organizations:*
              - account:*
              - billing:*
              - budgets:*
              - ce:*
              - cur:*
              - aws-portal:*
              - purchase-orders:*
              - savingsplans:*
              - reservations:*
            Resource: '*'

  # ── IAM Console User (lab student) ───────────────────────────────────────
  LabConsoleUser:
    Type: AWS::IAM::User
    DependsOn: LabPermissionBoundary
    Properties:
      UserName: !Ref LabIAMConsoleUsername
      LoginProfile:
        Password: !Ref LabIAMConsolePassword
        PasswordResetRequired: false
      PermissionsBoundary: !Ref LabPermissionBoundary
      ManagedPolicyArns:
        - !Ref LabStudentPolicy

  # ── Lab Student Inline Policy (attached to the console user) ─────────────
  LabStudentPolicy:
    Type: AWS::IAM::ManagedPolicy
    DependsOn: LabPermissionBoundary
    Properties:
      ManagedPolicyName: LabStudentPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEC2FreeTierInstanceTypesOnly
            Effect: Allow
            Action:
              - ec2:RunInstances
              - ec2:StopInstances
              - ec2:StartInstances
              - ec2:TerminateInstances
              - ec2:RebootInstances
              - ec2:CreateKeyPair
              - ec2:DeleteKeyPair
              - ec2:ImportKeyPair
              - ec2:CreateSecurityGroup
              - ec2:DeleteSecurityGroup
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:AuthorizeSecurityGroupEgress
              - ec2:RevokeSecurityGroupIngress
              - ec2:RevokeSecurityGroupEgress
              - ec2:CreateTags
              - ec2:DeleteTags
            Resource: '*'
            Condition:
              StringEquals:
                ec2:InstanceType:
                  - t2.micro
                  - t3.micro
          - Sid: AllowEC2DescribeUnconditional
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
              - ec2:DescribeInstanceTypes
              - ec2:DescribeImages
              - ec2:DescribeKeyPairs
              - ec2:DescribeSecurityGroups
              - ec2:DescribeVpcs
              - ec2:DescribeSubnets
              - ec2:DescribeRegions
              - ec2:DescribeTags
              - ec2:DescribeVolumes
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeLaunchTemplates
              - ec2:DescribeLaunchTemplateVersions
            Resource: '*'
          - Sid: AllowIAMRoleAndPolicyManagementWithBoundaryEnforcement
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:PassRole
              - iam:TagRole
              - iam:UntagRole
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:SetDefaultPolicyVersion
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:CreateInstanceProfile
              - iam:DeleteInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:RemoveRoleFromInstanceProfile
            Resource: '*'
            Condition:
              StringEquals:
                iam:PermissionsBoundary: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/LabPermissionBoundary'
          - Sid: AllowIAMReadAlways
            Effect: Allow
            Action:
              - iam:GetRole
              - iam:ListRoles
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicies
              - iam:ListPolicyVersions
              - iam:ListEntitiesForPolicy
              - iam:GetUser
              - iam:ListUsers
              - iam:GetGroup
              - iam:ListGroups
              - iam:GetUserPolicy
              - iam:ListUserPolicies
              - iam:ListAttachedUserPolicies
              - iam:ListGroupsForUser
              - iam:GetRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:GetInstanceProfile
              - iam:ListInstanceProfiles
              - iam:ListInstanceProfilesForRole
              - iam:GetAccountSummary
              - iam:GetAccountPasswordPolicy
              - iam:GetCredentialReport
              - iam:GenerateCredentialReport
              - iam:SimulatePrincipalPolicy
              - iam:SimulateCustomPolicy
            Resource: '*'
          - Sid: AllowIAMSelfCredentialManagement
            Effect: Allow
            Action:
              - iam:ChangePassword
              - iam:GetLoginProfile
              - iam:UpdateLoginProfile
              - iam:CreateAccessKey
              - iam:DeleteAccessKey
              - iam:ListAccessKeys
              - iam:UpdateAccessKey
              - iam:GetAccessKeyLastUsed
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:user/${LabIAMConsoleUsername}'
          - Sid: DenyIAMUserAndGroupMutation
            Effect: Deny
            Action:
              - iam:CreateUser
              - iam:DeleteUser
              - iam:UpdateUser
              - iam:CreateLoginProfile
              - iam:DeleteLoginProfile
              - iam:AddUserToGroup
              - iam:RemoveUserFromGroup
              - iam:CreateGroup
              - iam:DeleteGroup
              - iam:UpdateGroup
              - iam:AttachUserPolicy
              - iam:DetachUserPolicy
              - iam:PutUserPolicy
              - iam:DeleteUserPolicy
              - iam:AttachGroupPolicy
              - iam:DetachGroupPolicy
              - iam:PutGroupPolicy
              - iam:DeleteGroupPolicy
            Resource: '*'
          - Sid: DenyBoundaryTampering
            Effect: Deny
            Action:
              - iam:DeleteRolePermissionsBoundary
              - iam:DeleteUserPermissionsBoundary
              - iam:PutRolePermissionsBoundary
              - iam:PutUserPermissionsBoundary
            Resource: '*'
          - Sid: AllowS3BasicLabAccess
            Effect: Allow
            Action:
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation
              - s3:ListBucket
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:CreateBucket
              - s3:DeleteBucket
              - s3:GetBucketPolicy
              - s3:PutBucketPolicy
              - s3:GetBucketAcl
              - s3:PutBucketAcl
            Resource: '*'
          - Sid: AllowCloudWatchAndLogs
            Effect: Allow
            Action:
              - cloudwatch:GetMetricData
              - cloudwatch:GetMetricStatistics
              - cloudwatch:ListMetrics
              - cloudwatch:DescribeAlarms
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:GetLogEvents
              - logs:FilterLogEvents
            Resource: '*'
          - Sid: AllowSTSForRoleAssumption
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
              - sts:AssumeRole
            Resource: '*'
          - Sid: DenyBillingAndOrgActions
            Effect: Deny
            Action:
              - organizations:*
              - account:*
              - billing:*
              - budgets:*
              - ce:*
              - cur:*
              - aws-portal:*
              - purchase-orders:*
              - savingsplans:*
              - reservations:*
            Resource: '*'

  # ── IAM Role for the EC2 Jump VM itself ───────────────────────────────────
  LabIAMRole:
    Type: AWS::IAM::Role
    DependsOn: LabPermissionBoundary
    Properties:
      RoleName: LabJumpVMRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !Ref LabPermissionBoundary
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  LabInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: LabJumpVMInstanceProfile
      Roles:
        - !Ref LabIAMRole

  # ── Networking ────────────────────────────────────────────────────────────
  LabVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: IAMLabVPC
        - Key: CloudLabs
          Value: !Ref LabUserTag

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: IAMLabIGW
        - Key: CloudLabs
          Value: !Ref LabUserTag

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref LabVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: !Ref PublicSubnetCIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: IAMLabPublicSubnet
        - Key: CloudLabs
          Value: !Ref LabUserTag

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LabVPC
      Tags:
        - Key: Name
          Value: IAMLabPublicRT
        - Key: CloudLabs
          Value: !Ref LabUserTag

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  LabSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for IAM Lab Windows Jump VM - allows RDP and HTTPS
      VpcId: !Ref LabVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: !Ref RDPAllowedCIDR
          Description: RDP access for CloudLabs EC2 over HTTP feature
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref RDPAllowedCIDR
          Description: HTTPS for browser-based RDP via CloudLabs
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref RDPAllowedCIDR
          Description: HTTP for CloudLabs EC2 access over HTTP feature
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: IAMLabSG
        - Key: CloudLabs
          Value: !Ref LabUserTag

  # ── Windows Jump VM ───────────────────────────────────────────────────────
  LabWindowsVM:
    Type: AWS::EC2::Instance
    DependsOn:
      - LabInstanceProfile
      - LabPermissionBoundary
      - AttachGateway
    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M   # wait up to 20 min for cfn-signal
    Metadata:
      AWS::CloudFormation::Init:
        config:
          commands:
            01_noop:
              command: echo CFN-Init placeholder
    Properties:
      IamInstanceProfile: !Ref LabInstanceProfile
      ImageId: !Ref WindowsAMIId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref LabSecurityGroup
      Tags:
        - Key: Name
          Value: IAMLabJumpVM
        - Key: CloudLabs
          Value: !Ref LabUserTag
        - Key: Lab
          Value: IAMBasics
      UserData:
        Fn::Base64: !Sub |
          <powershell>
          $ErrorActionPreference = "Stop"

          # ── 1. Create / update local admin account ──────────────────────
          $Username = "${VMAdminUsername}"
          $Password = ConvertTo-SecureString "${VMAdminPassword}" -AsPlainText -Force

          if (Get-LocalUser -Name $Username -ErrorAction SilentlyContinue) {
              Set-LocalUser -Name $Username -Password $Password
          } else {
              New-LocalUser -Name $Username -Password $Password `
                  -FullName "Lab Administrator" `
                  -Description "CloudLabs Jump VM admin" `
                  -PasswordNeverExpires
              Add-LocalGroupMember -Group "Administrators" -Member $Username
          }

          # ── 2. Enable RDP and fix NLA (Network Level Authentication) ────
          # Without setting UserAuthentication = 0 the RDP client gets
          # "The remote computer requires NLA" and the connection is refused.
          Set-ItemProperty `
              -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
              -Name "fDenyTSConnections" -Value 0

          Set-ItemProperty `
              -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
              -Name "UserAuthentication" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # ── 3. Allow password-based RDP (disable blank-password restriction) ──
          Set-ItemProperty `
              -Path "HKLM:\System\CurrentControlSet\Control\Lsa" `
              -Name "LimitBlankPasswordUse" -Value 0

          # ── 4. Install AWS CLI v2 ────────────────────────────────────────
          try {
              Invoke-WebRequest -Uri "https://awscli.amazonaws.com/AWSCLIV2.msi" `
                  -OutFile "C:\AWSCLIV2.msi" -UseBasicParsing
              Start-Process msiexec.exe -ArgumentList "/i C:\AWSCLIV2.msi /quiet /norestart" -Wait
              Remove-Item "C:\AWSCLIV2.msi" -Force
          } catch {
              Write-Host "AWS CLI install failed: $_"
          }

          # ── 5. Install Google Chrome ─────────────────────────────────────
          try {
              Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" `
                  -OutFile "C:\chrome_installer.exe" -UseBasicParsing
              Start-Process "C:\chrome_installer.exe" -ArgumentList "/silent /install" -Wait
              Remove-Item "C:\chrome_installer.exe" -Force
          } catch {
              Write-Host "Chrome install failed: $_"
          }

          # ── 6. Desktop shortcut to AWS Console ──────────────────────────
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("C:\Users\Public\Desktop\AWS Console.lnk")
          $Shortcut.TargetPath  = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $Shortcut.Arguments   = "https://console.aws.amazon.com"
          $Shortcut.Description = "Open AWS Console"
          $Shortcut.Save()

          # ── 7. README on Desktop ─────────────────────────────────────────
          $readme = @"
          AWS IAM Basics Lab - Contoso Startup Labs
          ==========================================
          Console login
            URL      : https://console.aws.amazon.com
            Username : ${LabIAMConsoleUsername}
            Password : ${LabIAMConsolePassword}

          RESTRICTIONS
            - EC2: only t2.micro and t3.micro instance types allowed
            - IAM: creating users or modifying user/group policies is blocked
            - All roles you create MUST have the LabPermissionBoundary attached

          TOOLS PRE-INSTALLED
            - AWS CLI v2  (run: aws --version)
            - Google Chrome

          Follow the lab guide in your CloudLabs browser tab.
          "@
          Set-Content -Path "C:\Users\Public\Desktop\README.txt" -Value $readme -Encoding UTF8

          # ── 8. Signal CloudFormation that bootstrap completed ─────────────
          # This MUST be the last line. Without it, CFN waits the full
          # CreationPolicy timeout (20 min) before marking the stack as failed.
          & "C:\Program Files\Amazon\cfn-bootstrap\cfn-signal.exe" `
              --exit-code 0 `
              --stack "${AWS::StackName}" `
              --resource LabWindowsVM `
              --region "${AWS::Region}"
          </powershell>
          <persist>true</persist>

Outputs:

  InstanceId:
    Description: EC2 Instance ID of the Windows Jump VM
    Value: !Ref LabWindowsVM

  PublicIP:
    Description: Public IP address of the Windows Jump VM (use for direct RDP testing)
    Value: !GetAtt LabWindowsVM.PublicIp

  VpcId:
    Description: VPC ID created for this lab
    Value: !Ref LabVPC

  SubnetId:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet

  SecurityGroupId:
    Description: Security Group ID for the lab VM
    Value: !Ref LabSecurityGroup

  VMAdminUsername:
    Description: Windows local administrator username (for RDP)
    Value: !Ref VMAdminUsername

  LabConsoleLoginURL:
    Description: AWS Console sign-in URL for lab students
    Value: !Sub 'https://${AWS::AccountId}.signin.aws.amazon.com/console'

  LabConsoleUsername:
    Description: IAM username for lab student console login
    Value: !Ref LabIAMConsoleUsername



    

    