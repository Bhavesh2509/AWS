AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Contoso Startup Labs - AWS IAM Basics Lab | Windows Jump VM with pre-installed
  tools
Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
    Description: >-
      EC2 instance type for the Windows Jump VM. Only free-tier eligible types
      are allowed.
  WindowsAMIId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: /aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base
    Description: >-
      Windows Server 2022 AMI ID resolved from SSM Parameter Store for the
      deployment region.
  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the Lab VPC.
  PublicSubnetCIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the public subnet.
  RDPAllowedCIDR:
    Type: String
    Default: 0.0.0.0/0
    Description: >-
      CIDR range allowed to reach the VM over RDP/HTTPS. Restrict to CloudLabs
      IP range in production.
  VMAdminUsername:
    Type: String
    Default: LabAdmin
    Description: Local administrator username for the Windows VM.
  VMAdminPassword:
    Type: String
    NoEcho: true
    MinLength: 12
    MaxLength: 64
    Description: >-
      Local administrator password for the Windows VM. Must be at least 12
      characters.
    ConstraintDescription: Must be at least 12 characters long.
  LabUserTag:
    Type: String
    Default: lab-user
    Description: Tag value used to identify all resources belonging to this lab deployment.
Resources:
  
  LabPermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties: 
      ManagedPolicyName: LabPermissionBoundary
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: BoundaryAllowEC2FreeTierOnly
            Effect: Allow
            Action:
              - 'ec2:RunInstances'
              - 'ec2:StopInstances'
              - 'ec2:StartInstances'
              - 'ec2:TerminateInstances'
              - 'ec2:RebootInstances'
              - 'ec2:DescribeInstances'
              - 'ec2:DescribeInstanceStatus'
              - 'ec2:DescribeInstanceTypes'
              - 'ec2:DescribeImages'
              - 'ec2:DescribeKeyPairs'
              - 'ec2:DescribeSecurityGroups'
              - 'ec2:DescribeSecurityGroupRules'
              - 'ec2:DescribeVpcs'
              - 'ec2:DescribeSubnets'
              - 'ec2:DescribeRouteTables'
              - 'ec2:DescribeInternetGateways'
              - 'ec2:DescribeAvailabilityZones'
              - 'ec2:DescribeRegions'
              - 'ec2:DescribeTags'
              - 'ec2:DescribeVolumes'
              - 'ec2:DescribeNetworkInterfaces'
              - 'ec2:CreateKeyPair'
              - 'ec2:DeleteKeyPair'
              - 'ec2:ImportKeyPair'
              - 'ec2:CreateSecurityGroup'
              - 'ec2:DeleteSecurityGroup'
              - 'ec2:AuthorizeSecurityGroupIngress'
              - 'ec2:AuthorizeSecurityGroupEgress'
              - 'ec2:RevokeSecurityGroupIngress'
              - 'ec2:RevokeSecurityGroupEgress'
              - 'ec2:CreateTags'
              - 'ec2:DeleteTags'
            Resource: '*'
            Condition:
              StringEquals:
                'ec2:InstanceType':
                  - t2.micro
                  - t3.micro
          - Sid: BoundaryAllowEC2DescribeUnconditional
            Effect: Allow
            Action:
              - 'ec2:DescribeInstances'
              - 'ec2:DescribeInstanceStatus'
              - 'ec2:DescribeInstanceTypes'
              - 'ec2:DescribeImages'
              - 'ec2:DescribeKeyPairs'
              - 'ec2:DescribeSecurityGroups'
              - 'ec2:DescribeVpcs'
              - 'ec2:DescribeSubnets'
              - 'ec2:DescribeRegions'
              - 'ec2:DescribeTags'
              - 'ec2:DescribeVolumes'
              - 'ec2:DescribeAvailabilityZones'
            Resource: '*'
          - Sid: BoundaryAllowIAMScopedToLabOnly
            Effect: Allow
            Action:
              - 'iam:CreateRole'
              - 'iam:DeleteRole'
              - 'iam:UpdateRole'
              - 'iam:GetRole'
              - 'iam:ListRoles'
              - 'iam:PassRole'
              - 'iam:TagRole'
              - 'iam:UntagRole'
              - 'iam:CreatePolicy'
              - 'iam:DeletePolicy'
              - 'iam:CreatePolicyVersion'
              - 'iam:DeletePolicyVersion'
              - 'iam:SetDefaultPolicyVersion'
              - 'iam:GetPolicy'
              - 'iam:GetPolicyVersion'
              - 'iam:ListPolicies'
              - 'iam:ListPolicyVersions'
              - 'iam:ListEntitiesForPolicy'
              - 'iam:AttachRolePolicy'
              - 'iam:DetachRolePolicy'
              - 'iam:PutRolePolicy'
              - 'iam:DeleteRolePolicy'
              - 'iam:GetRolePolicy'
              - 'iam:ListRolePolicies'
              - 'iam:ListAttachedRolePolicies'
              - 'iam:CreateInstanceProfile'
              - 'iam:DeleteInstanceProfile'
              - 'iam:AddRoleToInstanceProfile'
              - 'iam:RemoveRoleFromInstanceProfile'
              - 'iam:GetInstanceProfile'
              - 'iam:ListInstanceProfiles'
              - 'iam:ListInstanceProfilesForRole'
              - 'iam:GetUser'
              - 'iam:ListUsers'
              - 'iam:GetGroup'
              - 'iam:ListGroups'
              - 'iam:GetUserPolicy'
              - 'iam:ListUserPolicies'
              - 'iam:ListAttachedUserPolicies'
              - 'iam:ListGroupsForUser'
              - 'iam:GetAccountSummary'
              - 'iam:GetAccountPasswordPolicy'
              - 'iam:GetCredentialReport'
              - 'iam:GenerateCredentialReport'
              - 'iam:SimulatePrincipalPolicy'
              - 'iam:SimulateCustomPolicy'
              - 'iam:ChangePassword'
              - 'iam:GetLoginProfile'
              - 'iam:CreateAccessKey'
              - 'iam:DeleteAccessKey'
              - 'iam:ListAccessKeys'
              - 'iam:UpdateAccessKey'
              - 'iam:GetAccessKeyLastUsed'
            Resource: '*'
            Condition:
              StringEquals:
                'iam:PermissionsBoundary': 'arn:aws:iam::${aws:PrincipalAccount}:policy/LabPermissionBoundary'
          - Sid: BoundaryAllowIAMReadWithoutBoundaryCondition
            Effect: Allow
            Action:
              - 'iam:GetRole'
              - 'iam:ListRoles'
              - 'iam:GetPolicy'
              - 'iam:GetPolicyVersion'
              - 'iam:ListPolicies'
              - 'iam:ListPolicyVersions'
              - 'iam:ListEntitiesForPolicy'
              - 'iam:GetUser'
              - 'iam:ListUsers'
              - 'iam:GetGroup'
              - 'iam:ListGroups'
              - 'iam:GetAccountSummary'
              - 'iam:GetCredentialReport'
              - 'iam:GenerateCredentialReport'
              - 'iam:SimulatePrincipalPolicy'
              - 'iam:SimulateCustomPolicy'
            Resource: '*'
          - Sid: BoundaryAllowS3Basic
            Effect: Allow
            Action:
              - 's3:ListAllMyBuckets'
              - 's3:GetBucketLocation'
              - 's3:ListBucket'
              - 's3:GetObject'
              - 's3:PutObject'
              - 's3:DeleteObject'
              - 's3:CreateBucket'
              - 's3:DeleteBucket'
              - 's3:GetBucketPolicy'
              - 's3:PutBucketPolicy'
              - 's3:GetBucketAcl'
              - 's3:PutBucketAcl'
            Resource: '*'
          - Sid: BoundaryAllowSupportingServices
            Effect: Allow
            Action:
              - 'cloudwatch:GetMetricData'
              - 'cloudwatch:GetMetricStatistics'
              - 'cloudwatch:ListMetrics'
              - 'cloudwatch:DescribeAlarms'
              - 'logs:DescribeLogGroups'
              - 'logs:DescribeLogStreams'
              - 'logs:GetLogEvents'
              - 'logs:FilterLogEvents'
              - 'sts:GetCallerIdentity'
              - 'sts:AssumeRole'
            Resource: '*'
          - Sid: BoundaryDenyEscalationVectors
            Effect: Deny
            Action:
              - 'iam:CreateUser'
              - 'iam:DeleteUser'
              - 'iam:UpdateUser'
              - 'iam:CreateLoginProfile'
              - 'iam:DeleteLoginProfile'
              - 'iam:AddUserToGroup'
              - 'iam:RemoveUserFromGroup'
              - 'iam:CreateGroup'
              - 'iam:DeleteGroup'
              - 'iam:UpdateGroup'
              - 'iam:AttachUserPolicy'
              - 'iam:DetachUserPolicy'
              - 'iam:PutUserPolicy'
              - 'iam:DeleteUserPolicy'
              - 'iam:AttachGroupPolicy'
              - 'iam:DetachGroupPolicy'
              - 'iam:PutGroupPolicy'
              - 'iam:DeleteGroupPolicy'
              - 'iam:UpdateAssumeRolePolicy'
            Resource: '*'
          - Sid: BoundaryDenyBoundaryRemovalOrModification
            Effect: Deny
            Action:
              - 'iam:DeleteRolePermissionsBoundary'
              - 'iam:DeleteUserPermissionsBoundary'
              - 'iam:PutRolePermissionsBoundary'
              - 'iam:PutUserPermissionsBoundary'
            Resource: '*'
          - Sid: BoundaryDenyBillingAndOrgActions
            Effect: Deny
            Action:
              - 'organizations:*'
              - 'account:*'
              - 'billing:*'
              - 'budgets:*'
              - 'ce:*'
              - 'cur:*'
              - 'aws-portal:*'
              - 'purchase-orders:*'
              - 'savingsplans:*'
              - 'reservations:*'
            Resource: '*'

  LabIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole

      PermissionsBoundary: !Ref LabPermissionBoundary

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  LabInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref LabIAMRole

  LabVPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock:
        Ref: VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: IAMLabVPC
        - Key: CloudLabs
          Value:
            Ref: LabUserTag

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
        - Key: Name
          Value: IAMLabIGW
        - Key: CloudLabs
          Value:
            Ref: LabUserTag

  AttachGateway:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId:
        Ref: LabVPC
      InternetGatewayId:
        Ref: InternetGateway

  PublicSubnet:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId:
        Ref: LabVPC
      CidrBlock:
        Ref: PublicSubnetCIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone:
        'Fn::Select':
          - 0
          - 'Fn::GetAZs': ''
      Tags:
        - Key: Name
          Value: IAMLabPublicSubnet
        - Key: CloudLabs
          Value:
            Ref: LabUserTag

  PublicRouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId:
        Ref: LabVPC
      Tags:
        - Key: Name
          Value: IAMLabPublicRT
        - Key: CloudLabs
          Value:
            Ref: LabUserTag

  PublicRoute:
    Type: 'AWS::EC2::Route'
    DependsOn: AttachGateway
    Properties:
      RouteTableId:
        Ref: PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId:
        Ref: InternetGateway

  SubnetRouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId:
        Ref: PublicSubnet
      RouteTableId:
        Ref: PublicRouteTable

  LabSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Security group for IAM Lab Windows Jump VM - allows RDP and HTTPS
      VpcId:
        Ref: LabVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp:
            Ref: RDPAllowedCIDR
          Description: RDP access for CloudLabs EC2 over HTTP feature
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp:
            Ref: RDPAllowedCIDR
          Description: HTTPS for browser-based RDP via CloudLabs
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp:
            Ref: RDPAllowedCIDR
          Description: HTTP for CloudLabs EC2 access over HTTP feature
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: IAMLabSG
        - Key: CloudLabs
          Value:
            Ref: LabUserTag

  LabWindowsVM:
    Type: 'AWS::EC2::Instance'
    Properties:
      IamInstanceProfile: !Ref LabInstanceProfile
      ImageId:
        Ref: WindowsAMIId
      InstanceType:
        Ref: InstanceType
      SubnetId:
        Ref: PublicSubnet
      SecurityGroupIds:
        - Ref: LabSecurityGroup
      Tags:
        - Key: Name
          Value: IAMLabJumpVM
        - Key: CloudLabs
          Value:
            Ref: LabUserTag
        - Key: Lab
          Value: IAMBasics
      UserData:
        'Fn::Base64':
          'Fn::Join':
            - ''
            - - |
                <powershell>
              - |
                # Set local administrator password
              - $AdminPassword = ConvertTo-SecureString '
              - Ref: VMAdminPassword
              - |
                ' -AsPlainText -Force
              - Set-LocalUser -Name '
              - Ref: VMAdminUsername
              - |
                ' -Password $AdminPassword -ErrorAction SilentlyContinue
              - New-LocalUser -Name '
              - Ref: VMAdminUsername
              - >
                ' -Password $AdminPassword -FullName 'Lab Administrator'
                -Description 'CloudLabs Lab Admin' -ErrorAction SilentlyContinue
              - Add-LocalGroupMember -Group 'Administrators' -Member '
              - Ref: VMAdminUsername
              - |
                ' -ErrorAction SilentlyContinue
              - |
                # Enable RDP
              - >
                Set-ItemProperty -Path
                'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name
                'fDenyTSConnections' -Value 0
              - |
                Enable-NetFirewallRule -DisplayGroup 'Remote Desktop'
              - >
                Set-ItemProperty -Path
                'HKLM:\System\CurrentControlSet\Control\Terminal
                Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 0
              - |
                # Install AWS CLI v2
              - >
                Invoke-WebRequest -Uri
                'https://awscli.amazonaws.com/AWSCLIV2.msi' -OutFile
                'C:\AWSCLIV2.msi'
              - >
                Start-Process msiexec.exe -ArgumentList '/i C:\AWSCLIV2.msi
                /quiet' -Wait
              - |
                # Install Google Chrome
              - >
                Invoke-WebRequest -Uri
                'https://dl.google.com/chrome/install/latest/chrome_installer.exe'
                -OutFile 'C:\chrome_installer.exe'
              - >
                Start-Process 'C:\chrome_installer.exe' -ArgumentList '/silent
                /install' -Wait
              - |
                # Create desktop shortcut to AWS Console
              - |
                $WshShell = New-Object -ComObject WScript.Shell
              - >
                $Shortcut =
                $WshShell.CreateShortcut('C:\Users\Public\Desktop\AWS
                Console.lnk')
              - >
                $Shortcut.TargetPath = 'C:\Program
                Files\Google\Chrome\Application\chrome.exe'
              - |
                $Shortcut.Arguments = 'https://console.aws.amazon.com'
              - |
                $Shortcut.Save()
              - |
                # Create README on Desktop
              - |
                $ReadmeContent = @'
              - |
                AWS IAM Basics Lab - Contoso Startup Labs
              - |
                ==========================================
              - |+
                Welcome to your lab environment!

              - |
                IMPORTANT RESTRICTIONS:
              - |
                - You may only launch t2.micro or t3.micro EC2 instances.
              - |
                - Creating IAM users or modifying IAM policies is not permitted.
              - |+
                - Follow the lab guide visible in your CloudLabs browser tab.

              - |
                Tools pre-installed:
              - |
                - AWS CLI v2
              - |
                - Google Chrome
              - |
                '@
              - >
                Set-Content -Path 'C:\Users\Public\Desktop\README.txt' -Value
                $ReadmeContent
              - |
                # Signal CloudFormation success
              - |
                </powershell>
              - |
                <persist>true</persist>

Outputs:
  InstanceId:
    Description: EC2 Instance ID of the Windows Jump VM
    Value:
      Ref: LabWindowsVM
  PublicIP:
    Description: Public IP address of the Windows Jump VM
    Value:
      'Fn::GetAtt':
        - LabWindowsVM
        - PublicIp
  VpcId:
    Description: VPC ID created for this lab
    Value:
      Ref: LabVPC
  SubnetId:
    Description: Public Subnet ID
    Value:
      Ref: PublicSubnet
  SecurityGroupId:
    Description: Security Group ID for the lab VM
    Value:
      Ref: LabSecurityGroup
  VMAdminUsername:
    Description: Windows VM local administrator username
    Value:
      Ref: VMAdminUsername


